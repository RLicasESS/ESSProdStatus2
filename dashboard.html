<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ESS DASHBOARD</title>

  <style>
    body { font-family: Arial; margin: 16px; }
    h2 { text-align: center; }

    #mode {
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
    }

    table {
      border-collapse: collapse;
      width: 85%;
      margin: auto;
    }

    th, td {
      border: 1px solid #aaa;
      padding: 10px;
    }

    th {
      background: #2c3e50;
      color: white;
    }

    a {
      color: #007bff;
      font-weight: bold;
      text-decoration: none;
    }

    .muted {
      color: #888;
    }
  </style>
</head>

<body>

<h2>ESS DASHBOARD</h2>
<div id="mode"></div>

<table id="tbl"></table>

<script>

// ================= MODE =================
const mode = (new URLSearchParams(location.search).get("links") || "").toLowerCase();

const isPI = mode === "pi";
const isPC = mode === "pc";

document.getElementById("mode").innerText =
  mode ? `MODE: ${mode.toUpperCase()}` : "MODE: VIEW ONLY";

// ================= MAPPING =================
const tester = {
  label: "ESSTester_01",
  url: "https://connect.raspberrypi.com/devices/60a5a481-6e1a-43b3-8fd6-95b26e95aca0"
};

const handlers = {
  "CHROMA": "ESSHandler_04",
  "NS-3": "ESSHandler_03",
  "NS-4": "ESSHandler_02",
  "NS-5": "ESSHandler_01",
  "NS-6": "ESSHandler_05"
};

const ap = {
  "AP-1": "172.18.148.141",
  "AP-2": "172.18.97.10"
};

const s100 = {
  "S100_1": "172.18.50.107",
  "S100_2": "172.18.87.18",
  "S100_4": "172.18.50.83"
};

// ================= HELPERS =================
function link(url, text) {
  return `<a href="${url}" target="_blank">${text}</a>`;
}

// VNC only in PI mode
function vnc(ip, text) {
  return `<a href="#" onclick="window.open('http://localhost:9000/vnc?ip=${ip}','_blank')">${text}</a>`;
}

// ================= TABLE =================
const tbl = document.getElementById("tbl");

function row(type, name) {
  const tr = document.createElement("tr");

  let value = "";

  // ---- TESTER ----
  if (type === "TESTER") {
    value = (isPI || isPC)
      ? link(tester.url, tester.label)
      : tester.label;
  }

  // ---- HANDLERS ----
  else if (handlers[type]) {
    const label = handlers[type];
    value = (isPI || isPC)
      ? link("https://connect.raspberrypi.com/devices", label)
      : label;
  }

  // ---- AP ----
  else if (ap[type]) {
    const ip = ap[type];
    value = isPI ? vnc(ip, ip)
          : isPC ? `<span class="muted">${ip}</span>`
          : ip;
  }

  // ---- S100 ----
  else if (s100[type]) {
    const ip = s100[type];
    value = isPI ? vnc(ip, ip)
          : isPC ? `<span class="muted">${ip}</span>`
          : ip;
  }

  tr.innerHTML = `<td>${type}</td><td>${value}</td>`;
  tbl.appendChild(tr);
}

// ================= BUILD =================
row("TESTER", "");

for (const k in handlers) row(k, "");

row("", "");
row("AP-1", "");
row("AP-2", "");

row("", "");
row("S100_1", "");
row("S100_2", "");
row("S100_4", "");

</script>

</body>
</html>
