<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESS DASHBOARD</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
    }

    h2 {
      text-align: center;
    }

    #mode {
      text-align: center;
      margin-bottom: 14px;
      font-weight: bold;
    }

    table {
      border-collapse: collapse;
      width: 90%;
      margin: auto;
    }

    th, td {
      border: 1px solid #aaa;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #2c3e50;
      color: white;
    }

    a {
      color: #007bff;
      font-weight: bold;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<h2>
  <a href="https://connect.raspberrypi.com/devices" target="_blank">
    ESS
  </a>
  DASHBOARD
</h2>

<div id="mode"></div>

<table id="tbl">
  <tr>
    <th>TYPE</th>
    <th>NAME</th>
  </tr>
</table>

<script>

// =====================================================
// MODE
// =====================================================
var params = new URLSearchParams(window.location.search);

var mode = params.get("links");

var isPI = (mode === "pi");
var isPC = (mode === "pc");

document.getElementById("mode").innerHTML =
  "MODE = " + (mode || "view");

// =====================================================
// HELPERS
// =====================================================
function mkLink(url, text) {
  return '<a href="' + url + '" target="_blank">' + text + '</a>';
}

function mkVNC(ip, text) {
  return '<a href="#" onclick="window.open(\'http://localhost:9000/vnc?ip=' + ip + '\', \'_blank\'); return false;">' + text + '</a>';
}

// =====================================================
// TABLE
// =====================================================
var tbl = document.getElementById("tbl");

function addRow(type, html) {

  var tr = document.createElement("tr");

  var td1 = document.createElement("td");
  td1.innerHTML = type;

  var td2 = document.createElement("td");
  td2.innerHTML = html;

  tr.appendChild(td1);
  tr.appendChild(td2);

  tbl.appendChild(tr);
}

// =====================================================
// TESTER
// =====================================================
if (isPI || isPC) {

  addRow(
    "TESTER",
    mkLink(
      "https://connect.raspberrypi.com/devices/60a5a481-6e1a-43b3-8fd6-95b26e95aca0",
      "ESSTester_01"
    )
  );

} else {

  addRow("TESTER", "ESSTester_01");

}

// =====================================================
// HANDLERS
// =====================================================
var handlers = [

  ["CHROMA", "ESSHandler_04",
   "https://connect.raspberrypi.com/devices/5fabcfc7-1bf1-445b-bf3d-b3e285895c7e"],

  ["NS-3", "ESSHandler_02",
   "https://connect.raspberrypi.com/devices/462b197a-acdb-4c97-bc15-70ab73addc46"],

  ["NS-4", "ESSHandler_03",
   "https://connect.raspberrypi.com/devices/66fa4727-e6b5-4a1a-855d-1f266270b950"],

  ["NS-5", "ESSHandler_01",
   "https://connect.raspberrypi.com/devices/468fc957-7879-440e-b1ea-b7e7dfef37f6"],

  ["NS-6", "ESSHandler_05",
   "https://connect.raspberrypi.com/devices/759713e5-9e7e-408a-9686-85fb7ed7b1d2"]

];

for (var i = 0; i < handlers.length; i++) {

  var h = handlers[i];

  if (isPI || isPC) {

    addRow(
      h[0],
      mkLink(h[2], h[1])
    );

  } else {

    addRow(h[0], h[1]);

  }
}

// =====================================================
// AP
// =====================================================
var ap = [

  ["AP-1", "172.18.148.141", "vnc://AP-1"],
  ["AP-2", "172.18.97.10",  "vnc://AP-2"]

];

for (var i = 0; i < ap.length; i++) {

  var a = ap[i];

  if (isPI) {

    addRow(
      a[0],
      mkVNC(a[1], a[0])
    );

  }
  else if (isPC) {

    addRow(
      a[0],
      '<a href="' + a[2] + '">' + a[0] + '</a>'
    );

  }
  else {

    addRow(a[0], a[1]);

  }
}

// =====================================================
// S100
// =====================================================
var s100 = [

  ["S100_1", "172.18.50.107", "vnc://S100-1"],
  ["S100_2", "172.18.87.18",  "vnc://S100-2"],
  ["S100_4", "172.18.50.83",  "vnc://S100-4"]

];

for (var i = 0; i < s100.length; i++) {

  var s = s100[i];

  if (isPI) {

    addRow(
      s[0],
      mkVNC(s[1], s[0])
    );

  }
  else if (isPC) {

    addRow(
      s[0],
      '<a href="' + s[2] + '">' + s[0] + '</a>'
    );

  }
  else {

    addRow(s[0], s[1]);

  }
}

</script>

</body>
</html>
