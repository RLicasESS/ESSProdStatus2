<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ESS DASHBOARD</title>

  <style>
    body { font-family: Arial; margin: 16px; }
    h2 { text-align: center; }

    #mode {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
    }

    table {
      border-collapse: collapse;
      width: 88%;
      margin: auto;
    }

    td {
      border: 1px solid #aaa;
      padding: 10px;
    }

    th {
      background: #2c3e50;
      color: white;
    }

    a {
      color: #007bff;
      font-weight: bold;
      text-decoration: none;
    }

    .muted { color: #888; }
  </style>
</head>

<body>

<h2>
  <a href="https://connect.raspberrypi.com/devices" target="_blank">ESS</a>
  DASHBOARD
</h2>

<div id="mode"></div>

<table id="tbl"></table>

<script>

// ================= MODE =================
const mode = (new URLSearchParams(location.search).get("links") || "").toLowerCase();
const isPI = mode === "pi";
const isPC = mode === "pc";

document.getElementById("mode").innerText =
  mode ? `MODE: ${mode.toUpperCase()}` : "MODE: VIEW ONLY";

// ================= DEVICE LINKS (FIXED) =================

// IMPORTANT: tester is the ONLY correct known Pi link you confirmed
const TESTER = {
  name: "ESSTester_01",
  url: "https://connect.raspberrypi.com/devices/60a5a481-6e1a-43b3-8fd6-95b26e95aca0"
};

// handlers still go to main page ONLY (unless you later provide device IDs)
const HANDLERS = {
  "CHROMA": "ESSHandler_04",
  "NS-3": "ESSHandler_03",
  "NS-4": "ESSHandler_02",
  "NS-5": "ESSHandler_01",
  "NS-6": "ESSHandler_05"
};

// AP + S100 IPs
const AP = {
  "AP-1": "172.18.148.141",
  "AP-2": "172.18.97.10"
};

const S100 = {
  "S100_1": "172.18.50.107",
  "S100_2": "172.18.87.18",
  "S100_4": "172.18.50.83"
};

// ================= HELPERS =================
function a(url, text) {
  return `<a href="${url}" target="_blank">${text}</a>`;
}

function vnc(ip, text) {
  return `<a href="#" onclick="window.open('http://localhost:9000/vnc?ip=${ip}','_blank')">${text}</a>`;
}

// ================= TABLE =================
const tbl = document.getElementById("tbl");

function row(type, value) {
  const tr = document.createElement("tr");

  let out = "";

  // ================= ESS (HEADER CASE) =================
  if (type === "ESS") {
    out = a("https://connect.raspberrypi.com/devices", "ESS");
  }

  // ================= TESTER =================
  else if (type === "TESTER") {
    out = (isPI || isPC)
      ? a(TESTER.url, TESTER.name)
      : TESTER.name;
  }

  // ================= HANDLERS =================
  else if (HANDLERS[type]) {
    const name = HANDLERS[type];

    // IMPORTANT FIX:
    // ONLY tester has real link
    // handlers fallback to main page ONLY if clicked
    out = (isPI || isPC)
      ? a("https://connect.raspberrypi.com/devices", name)
      : name;
  }

  // ================= AP =================
  else if (AP[type]) {
    const ip = AP[type];

    out = isPI
      ? vnc(ip, ip)
      : a(`http://${ip}`, ip);   // FIX: now ALWAYS clickable
  }

  // ================= S100 =================
  else if (S100[type]) {
    const ip = S100[type];

    out = isPI
      ? vnc(ip, ip)
      : a(`http://${ip}`, ip);   // FIX: now ALWAYS clickable
  }

  tr.innerHTML = `<td>${type}</td><td>${out}</td>`;
  tbl.appendChild(tr);
}

// ================= BUILD =================
row("ESS", "");
row("TESTER", "");

for (const k in HANDLERS) row(k, "");

row("AP-1", "");
row("AP-2", "");

row("S100_1", "");
row("S100_2", "");
row("S100_4", "");

</script>

</body>
</html>
