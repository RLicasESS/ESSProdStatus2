<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESS LINK DASHBOARD</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    .note {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
    }

    table {
      border-collapse: collapse;
      width: 94%;
      margin: 0 auto;
    }

    th, td {
      border: 1px solid #aaa;
      padding: 10px;
      vertical-align: top;
    }

    th {
      background: #2c3e50;
      color: white;
    }

    .section {
      background: #f2f2f2;
      font-weight: bold;
      text-align: center;
    }

    a {
      color: #007bff;
      font-weight: bold;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .small {
      font-size: 12px;
      color: #444;
    }
  </style>
</head>

<body>

<h2>ESS LINK DASHBOARD</h2>
<div class="note">
  Static reference page (no live CSV dependency)
</div>

<table id="tbl"></table>

<script>
const tbl = document.getElementById("tbl");

function row(type, name, link, cls="") {
  const tr = document.createElement("tr");
  if (cls) tr.className = cls;

  const td1 = document.createElement("td");
  td1.innerHTML = type;

  const td2 = document.createElement("td");
  td2.innerHTML = name;

  const td3 = document.createElement("td");
  td3.innerHTML = link;

  tr.appendChild(td1);
  tr.appendChild(td2);
  tr.appendChild(td3);

  tbl.appendChild(tr);
}

// ================= TESTER =================
row("<b>TYPE</b>", "<b>NAME</b>", "<b>LINK</b>");

row("TESTER", "MAIN TESTER",
  `<a href="https://connect.raspberrypi.com/devices/60a5a481-6e1a-43b3-8fd6-95b26e95aca0" target="_blank">
    Raspberry Pi Connect
  </a>`
);

// ================= HANDLERS =================
row("", "", "", "section");

const handlers = [
  ["CHROMA", "https://connect.raspberrypi.com/devices/5fabcfc7-1bf1-445b-bf3d-b3e285895c7e"],
  ["NS-3",   "https://connect.raspberrypi.com/devices/462b197a-acdb-4c97-bc15-70ab73addc46"],
  ["NS-4",   "https://connect.raspberrypi.com/devices/66fa4727-e6b5-4a1a-855d-1f266270b950"],
  ["NS-5",   "https://connect.raspberrypi.com/devices/468fc957-7879-440e-b1ea-b7e7dfef37f6"],
  ["NS-6",   "https://connect.raspberrypi.com/devices/759713e5-9e7e-408a-9686-85fb7ed7b1d2"]
];

for (const [name, url] of handlers) {
  row("HANDLER", name,
    `<a href="${url}" target="_blank">${name}</a>`
  );
}

// ================= AP MACHINES =================
row("", "", "", "section");

const ap = [
  ["AP-1", "172.18.148.141"],
  ["AP-2", "172.18.97.10"]
];

for (const [name, ip] of ap) {
  row(
    "AP",
    name,
    `
      <a href="http://${ip}:8080/latest.png" target="_blank">latest.png</a>
      <div class="small">VNC: ${ip}</div>
    `
  );
}

// ================= S100 =================
row("", "", "", "section");

const s100 = [
  ["S100_1", "172.18.50.107"],
  ["S100_2", "172.18.87.18"],
  ["S100_4", "172.18.50.83"]
];

for (const [name, ip] of s100) {
  row(
    "S100",
    name,
    `
      <a href="http://${ip}:8080/latest.png" target="_blank">latest.png</a>
      <div class="small">VNC: ${ip}</div>
    `
  );
}

</script>

</body>
</html>
