<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ESS Production Status</title>
<style>
  body { font-family: sans-serif; background: #f4f4f4; }
  table { border-collapse: collapse; width: 100%; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background: #333; color: #fff; }
  .running { background-color: #8bc34a; color: #000; }
  .paused { background-color: #ffc107; color: #000; }
  .error { background-color: #f44336; color: #fff; }
  .maint { background-color: #9e9e9e; color: #fff; }
  .duration { font-weight: bold; }
</style>
</head>
<body>

<h2>ESS Production Status</h2>
<table id="statusTable"></table>

<script>
const CSV_URL = 'https://rlicasess.github.io/ESSProdStatus2/essstatus.csv'; // replace with your CSV path

function parseDateTimeLocal(str) {
    if (!str) return null;
    return new Date(str);
}

async function loadCSV() {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const rows = text.trim().split('\n').map(r => r.split(','));

    // Identify key rows
    const headerRow = rows[0];
    let statusRow = rows.find(r => r[0].trim().toUpperCase() === "STATUS");
    let lastUpdRow = rows.find(r => r[0].trim().toUpperCase() === "LAST UPDATE");
    let statusSinceRow = rows.find(r => r[0].trim().toUpperCase() === "STATUS SINCE");

    // --- Insert DURATION row after STATUS ---
    const durationRow = [];
    durationRow[0] = "DURATION";

    const now = new Date();

    for (let c = 1; c < statusRow.length; c++) {
        const status = (statusRow[c] || "").toString().trim().toLowerCase();
        const lastUpdateStr = lastUpdRow[c] || "";
        const lastUpdateDate = parseDateTimeLocal(lastUpdateStr);

        let diffMs = 0;

        if (status === "running") {
            const statusSinceStr = statusSinceRow ? statusSinceRow[c] || "" : "";
            const statusSinceDate = parseDateTimeLocal(statusSinceStr);
            if (statusSinceDate && lastUpdateDate) {
                diffMs = lastUpdateDate - statusSinceDate;
            }
        } else {
            if (lastUpdateDate) {
                diffMs = now - lastUpdateDate;
            }
        }

        let display = "";
        if (diffMs && diffMs > 0) {
            const totalMinutes = Math.floor(diffMs / 60000);
            const h = Math.floor(totalMinutes / 60);
            const m = totalMinutes % 60;
            display = `${h}h ${m}m`;
        }

        durationRow[c] = display;
    }

    // Insert DURATION row right after STATUS
    const statusRowIndex = rows.indexOf(statusRow);
    rows.splice(statusRowIndex + 1, 0, durationRow);

    renderTable(rows);
}

function renderTable(rows) {
    const table = document.getElementById('statusTable');
    table.innerHTML = "";

    rows.forEach((row, rIndex) => {
        const tr = document.createElement('tr');
        row.forEach((cell, cIndex) => {
            const td = document.createElement(rIndex === 0 ? 'th' : 'td');
            td.textContent = cell;

            // Apply STATUS colors
            if (rIndex === rows.indexOf(rows.find(r => r[0].trim().toUpperCase() === "STATUS"))) {
                td.classList.add(cell.toLowerCase());
            }

            // Apply same color to DURATION row
            if (rIndex === rows.indexOf(rows.find(r => r[0].trim().toUpperCase() === "DURATION"))) {
                const statusCell = rows[rows.indexOf(rows.find(r => r[0].trim().toUpperCase() === "STATUS"))][cIndex] || "";
                td.classList.add(statusCell.toLowerCase());
                td.classList.add('duration');
            }

            tr.appendChild(td);
        });
        table.appendChild(tr);
    });
}

loadCSV();
</script>

</body>
</html>
