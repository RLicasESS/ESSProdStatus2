<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ESS Production Status</title>
<style>
  body { font-family: sans-serif; background: #f4f4f4; }
  table { border-collapse: collapse; width: 100%; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background: #333; color: #fff; }
  .running { background-color: #8bc34a; color: #000; }
  .paused { background-color: #ffc107; color: #000; }
  .error { background-color: #f44336; color: #fff; }
  .maint { background-color: #9e9e9e; color: #fff; }
  .duration { font-weight: bold; }
</style>
</head>
<body>

<h2>ESS Production Status</h2>
<table id="statusTable"></table>

<script>
const CSV_URL = 'https://rlicasess.github.io/ESSProdStatus2/essstatus.csv';

function parseDate(str) {
    if (!str) return null;
    return new Date(str);
}

function formatDuration(ms) {
    if (!ms || ms < 0) return "";
    const totalMinutes = Math.floor(ms / 60000);
    const h = Math.floor(totalMinutes / 60);
    const m = totalMinutes % 60;
    return `${h}h ${m}m`;
}

async function loadCSV() {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const rows = text.trim().split('\n').map(r => r.split(','));

    // Identify row indices
    const headerRow = rows[0];
    const statusIndex = rows.findIndex(r => r[0].trim().toUpperCase() === "STATUS");
    const lastUpdateIndex = rows.findIndex(r => r[0].trim().toUpperCase() === "LAST UPDATE");
    const statusSinceIndex = rows.findIndex(r => r[0].trim().toUpperCase() === "STATUS SINCE");

    if (statusIndex === -1 || lastUpdateIndex === -1) {
        alert("CSV missing STATUS or LAST UPDATE rows");
        return;
    }

    // Compute DURATION row
    const durationRow = ["DURATION"];
    const now = new Date();

    for (let c = 1; c < rows[0].length; c++) {
        const status = (rows[statusIndex][c] || "").trim().toLowerCase();
        const lastUpdateDate = parseDate(rows[lastUpdateIndex][c]);
        let diffMs = 0;

        if (status === "running" && statusSinceIndex !== -1) {
            const statusSinceDate = parseDate(rows[statusSinceIndex][c]);
            if (statusSinceDate && lastUpdateDate) diffMs = lastUpdateDate - statusSinceDate;
        } else {
            if (lastUpdateDate) diffMs = now - lastUpdateDate;
        }

        durationRow[c] = formatDuration(diffMs);
    }

    // Insert DURATION row right after STATUS
    rows.splice(statusIndex + 1, 0, durationRow);

    renderTable(rows, statusIndex);
}

function renderTable(rows, statusIndex) {
    const table = document.getElementById('statusTable');
    table.innerHTML = "";

    rows.forEach((row, rIndex) => {
        const tr = document.createElement('tr');
        row.forEach((cell, cIndex) => {
            const td = document.createElement(rIndex === 0 ? 'th' : 'td');
            td.textContent = cell;

            // STATUS colors
            if (rIndex === statusIndex) {
                td.classList.add(cell.toLowerCase());
            }

            // DURATION gets same color as STATUS
            if (rIndex === statusIndex + 1 && cIndex > 0) {
                const statusCell = rows[statusIndex][cIndex] || "";
                td.classList.add(statusCell.toLowerCase());
                td.classList.add('duration');
            }

            tr.appendChild(td);
        });
        table.appendChild(tr);
    });
}

loadCSV();
</script>

</body>
</html>
