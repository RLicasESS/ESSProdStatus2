<!-- MARKER: INDEX_YIELD_V20260326_STATUS_TIMEDIFF -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESS PRODUCTION STATUS</title>
  <style>
    table { border-collapse: collapse; width: 60%; margin: 20px auto; font-family: Arial, sans-serif; }
    th, td { border: 1px solid #aaa; padding: 8px 12px; text-align: left; vertical-align: top; }
    th { background-color: #2c3e50; color: white; font-weight: bold; }
    a { color: #007bff; font-weight: bold; text-decoration: none; }
    a:hover { text-decoration: underline; }
    a.statusLink, a.statusLink:visited, a.statusLink:hover, a.statusLink:active {
      color: inherit !important;
      font-weight: inherit !important;
      text-decoration: underline;
      cursor: pointer;
    }
    .statusCell { font-weight: bold; display: flex; flex-direction: column; }
    .statusDiff { font-size: 11px; font-weight: normal; }
  </style>
</head>
<body>
  <h2 id="pageTitle" style="text-align:center;">ESS PRODUCTION STATUS</h2>

  <script>
    const CSV_URL = "https://raw.githubusercontent.com/RLicasESS/ESSProdStatus2/main/ESSProd.csv";

    function norm(s) { return (s || "").toString().replace(/\r/g, "").trim().toUpperCase(); }
    function toInt(x) { const v=parseInt((x||"").toString().replace(/,/g,"").trim(),10); return Number.isNaN(v)?null:v; }
    function parseCSV(text){ const lines=text.replace(/\r/g,"").trim().split(/\n/); const delim=lines[0].includes("\t")? "\t":","; return lines.map(l=>l.split(delim)); }
    function parseDateTimeLocal(s){ if(!s) return null; let x=s.replace(" ","T").replace(/\.(\d{3})\d+/,".$1"); const d=new Date(x); return isNaN(d.getTime())?null:d; }
    function fmtTimeDiff(ms){ if(ms<0) ms=0; const sec=Math.floor(ms/1000); const min=Math.floor(sec/60); const h=Math.floor(min/60); const m=min%60; const s=sec%60; return h>0?`${h}h ${m}m ${s}s`:`${m}m ${s}s`; }

    async function loadCSV(){
      const resp = await fetch(CSV_URL + "?v="+Date.now(), {cache:"no-store"});
      if(!resp.ok){ console.error("CSV fetch failed", resp.status); return; }
      const rows=parseCSV(await resp.text());
      if(!rows.length) return;

      const statusRow = rows.find(r=>norm(r[0])==="STATUS")||[];
      const lastUpdateRow = rows.find(r=>norm(r[0])==="LAST UPDATE")||[];
      const statusSinceRow = rows.find(r=>norm(r[0])==="STATUS SINCE")||[];

      const table=document.createElement("table");
      const header=document.createElement("tr");
      for(let c=0;c<statusRow.length;c++){ const th=document.createElement("th"); th.textContent=statusRow[c]||""; header.appendChild(th); }
      table.appendChild(header);

      for(let r=1;r<rows.length;r++){
        const tr=document.createElement("tr");
        for(let c=0;c<rows[r].length;c++){
          const td=document.createElement("td");
          if(norm(rows[r][0])==="STATUS" && c>0){
            const st=(rows[r][c]||"").toLowerCase();
            td.className="statusCell";
            td.textContent=st.charAt(0).toUpperCase()+st.slice(1);

            // Calculate time diff
            const lastUpd=parseDateTimeLocal(lastUpdateRow[c]);
            const statusSince=parseDateTimeLocal(statusSinceRow[c]);
            let diffMs=0;
            if(st==="running" && lastUpd && statusSince) diffMs=lastUpd-statusSince;
            else if(st!=="running" && lastUpd) diffMs=Date.now()-lastUpd;

            const diffSpan=document.createElement("span");
            diffSpan.className="statusDiff";
            diffSpan.textContent=fmtTimeDiff(diffMs);
            td.appendChild(diffSpan);

            // color
            if(st==="running") td.style.color="#2e7d32";
            else if(st==="paused") td.style.color="#f39c12";
            else if(st==="error") td.style.color="#b00020";
            else td.style.color="#444";
          } else td.textContent=rows[r][c]||"";
          tr.appendChild(td);
        }
        table.appendChild(tr);
      }

      document.body.appendChild(table);
    }

    loadCSV();
  </script>
</body>
</html>
