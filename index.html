<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESS PRODUCTION STATUS</title>
  <style>
    table {
      border-collapse: collapse;
      width: 60%;
      margin: 20px auto;
      font-family: Arial, sans-serif;
    }
    th, td {
      border: 1px solid #aaa;
      padding: 8px 12px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background-color: #2c3e50;
      color: white;
      font-weight: bold;
    }
    a { color: #007bff; font-weight: bold; text-decoration: none; }
    a:hover { text-decoration: underline; }
    a.statusLink, a.statusLink:visited, a.statusLink:hover, a.statusLink:active {
      color: inherit !important;
      font-weight: inherit !important;
      text-decoration: underline;
      cursor: pointer;
    }

    #dbg {
      width: 60%;
      margin: 6px auto 0 auto;
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: #555;
      display: none;
      white-space: pre-wrap;
    }

    .lc-wrap { display: flex; flex-direction: column; gap: 6px; }
    .lc-num  { font-weight: 600; }
    .prog {
      height: 12px;
      border: 1px solid #bbb;
      border-radius: 8px;
      background: #f2f2f2;
      overflow: hidden;
    }
    .prog > .bar { height: 100%; width: 0%; background: #2e7d32; }
    .lc-pct { font-size: 12px; color: #444; }

    /* ---------- Yield tooltip ---------- */
    .yieldHover { position: relative; display: inline-block; cursor: help; }
    .yieldTip { display: none; }
    .yieldHover.isOpen .yieldTip { display: block; }

    .yieldTip {
      position: absolute;
      left: 0;
      top: 110%;
      min-width: 240px;
      max-width: 260px;
      background: #fff;
      border: 1px solid #aaa;
      border-radius: 10px;
      box-shadow: 0 10px 22px rgba(0,0,0,0.18);
      padding: 10px 10px 8px 10px;
      z-index: 9999;
    }
    .yieldTipTitle { font-weight: 700; font-size: 13px; margin-bottom: 4px; color: #222; }
    .yieldTipSub   { font-size: 12px; color: #555; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .yieldCanvas {
      width: 220px;
      height: 70px;
      border: 1px solid #ddd;
      border-radius: 8px;
      display: block;
      background: #fafafa;
      touch-action: none;
    }
    .yieldLegend { margin-top: 6px; font-size: 11px; color: #666; display: flex; justify-content: space-between; }
    .yieldNote   { margin-top: 6px; font-size: 11px; color: #777; }

    @media (max-width: 800px) {
      table, #dbg { width: 96%; }
      .yieldTip { left: 50%; transform: translateX(-50%); }
    }
  </style>
</head>

<body>
  <h2 id="pageTitle" style="text-align:center;">ESS PRODUCTION STATUS</h2>
  <div id="dbg"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const showLinks = params.get("links") === "1";
    const debug = params.get("debug") === "1";

    const TESTER_URL = "https://connect.raspberrypi.com/devices/60a5a481-6e1a-43b3-8fd6-95b26e95aca0";
    const yieldMode = (params.get("yield") || "real").toLowerCase();
    const useYieldForBars = (params.get("yieldbar") || "1") !== "0";
    const smoothWin = (() => {
      const raw = (params.get("smooth") || "").toLowerCase().trim();
      if (!raw) return 0;
      if (raw === "auto") return 5;
      const n = parseInt(raw, 10);
      return Number.isFinite(n) && n >= 3 ? n : 0;
    })();
    const yScale = (params.get("yScale") || "auto").toLowerCase();
    const yZoom = (yScale !== "full");

    document.title = "ESS PRODUCTION STATUS";
    const dbgEl = document.getElementById("dbg");
    if (debug) dbgEl.style.display = "block";
    function dbg(msg) { if (debug) dbgEl.textContent = msg; }

    if (showLinks) {
      document.getElementById("pageTitle").innerHTML =
        `<a href="https://connect.raspberrypi.com/devices" target="_blank">ESS</a> PRODUCTION STATUS`;
    }

    const CSV_URL   = "https://raw.githubusercontent.com/RLicasESS/ESSProdStatus2/main/ESSProd.csv";
    const YIELD_URL = "https://raw.githubusercontent.com/RLicasESS/ESSProdStatus2/main/yield_live.json";

    const HANDLER_IP = {
      "NS-3": "10.20.10.187",
      "NS-4": "10.20.10.238",
      "NS-5": "10.20.10.98",
      "NS-6": "10.20.10.99",
      "CHROMA": "10.20.10.38",
    };

    function norm(s) { return (s || "").toString().replace(/\r/g, "").trim().toUpperCase(); }
    function toInt(x) { const v = parseInt((x || "").toString().replace(/,/g, "").trim(), 10); return Number.isNaN(v) ? null : v; }
    function pad2(n) { return String(n).padStart(2, "0"); }

    function parseCSV(text) {
      const lines = text.replace(/\r/g, "").trim().split(/\n/);
      if (!lines.length) return [];
      const first = lines[0];
      const delim = first.includes("\t") ? "\t" : ",";
      return lines.map(line => line.split(delim));
    }

    let prevRowsByLabel = null;

    async function loadCSV() {
      try {
        dbg(`Loading CSV…`);

        const resp = await fetch(
          CSV_URL + (CSV_URL.includes("?") ? "&" : "?") + "v=" + Date.now(),
          { cache: "no-store" }
        );
        if (!resp.ok) { dbg(`CSV fetch failed: ${resp.status}`); return; }

        const text = await resp.text();
        const rows = parseCSV(text);
        if (!rows.length) { dbg("CSV parsed but empty."); return; }

        // ===== ADD DURATION ROW =====
        const statusRowIndex = rows.findIndex(r => norm(r[0]) === "STATUS");
        if (statusRowIndex >= 0) {
          const durationRow = Array(rows[statusRowIndex].length).fill("");
          durationRow[0] = "DURATION";
          rows.splice(statusRowIndex + 1, 0, durationRow);
        }

        // ...your existing code can continue here to build table, yield, etc...

        prevRowsByLabel = {};
        for (const r of rows) prevRowsByLabel[norm(r[0])] = r;

        // For demo: just log first few rows
        dbg("First rows: " + rows.slice(0,5).map(r => r.join(",")).join("\n"));

      } catch (e) { dbg("Error: " + e); }
    }

    loadCSV();
  </script>
</body>
</html>
