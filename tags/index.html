<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>NFC Encode (LOT / QTY / PRODUCT)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { --fg:#0f172a; --bg:#f8fafc; --accent:#2563eb; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color:var(--fg); background:var(--bg); margin:0; }
    header { padding:1rem 1.25rem; border-bottom:1px solid #e2e8f0; }
    main { max-width:800px; margin:0 auto; padding:1.25rem; }
    h1 { margin:.25rem 0 .5rem; font-weight:600; }
    p.note { color:#475569; margin:.25rem 0 1rem; }
    .grid { display:grid; gap:.75rem; grid-template-columns:1fr; }
    label { font-size:.9rem; color:#334155; }
    input { width:100%; padding:.65rem .75rem; border:1px solid #cbd5e1; border-radius:.5rem; font-size:1rem; }
    .row { display:flex; gap:.75rem; flex-wrap:wrap; margin-top:.75rem; }
    button { cursor:pointer; border:0; padding:.7rem 1rem; border-radius:.5rem; font-weight:600; }
    .primary { background:var(--accent); color:white; }
    .ok { color:#15803d; font-weight:600; }
    .warn { color:#b45309; font-weight:600; }
    .err { color:#b91c1c; font-weight:600; }
    #log { white-space:pre-wrap; font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; background:#f1f5f9; border:1px solid #e2e8f0; border-radius:.5rem; padding:.75rem; margin-top:1rem; }
  </style>

  <!-- Correct CDN script tags (only once each) -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <!-- Your app code (only once) -->
  <script defer src="nfctags.js"></script>
</head>
<body>
  <header>
    <h1>NFC Encode – LOT / QTY / PRODUCT</h1>
    <p class="note">
      Generate the <code>.gototags</code> file, then double‑click it to open GoToTags, press <b>Start ▶</b>, and write a tag.
    </p>
  </header>

  <main>
    <section>
      <div class="grid">
        <div>
          <label for="lot">Lot</label>
          <input id="lot" placeholder="e.g., LOT-2026-0001" />
        </div>
        <div>
          <label for="qty">Quantity</label>
          <input id="qty" placeholder="e.g., 25" />
        </div>
        <div>
          <label for="product">Product</label>
          <input id="product" placeholder="e.g., Widget Pro" />
        </div>
      </div>

      <div class="row">
        <!-- type="button" prevents any implicit form submit -->
        <button type="button" class="primary" id="btnGen">Generate Write File</button>
      </div>

      <div id="status" class="note" style="margin-top:.75rem;"></div>
      <div id="log" hidden></div>
    </section>
  </main>
</body>
</html>
